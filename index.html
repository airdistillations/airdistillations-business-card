<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>A·I·R Distillations — Founders</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --ink: #efeae3;
    --ink-dim: rgba(239, 234, 227, 0.55);
    --hair: rgba(239, 234, 227, 0.22);
    --dot: #efeae3;
    --max-w: 480px;
    --pad: 28px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: "JetBrains Mono", ui-monospace, monospace;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  body {
    min-height: 100svh;
    display: flex;
    justify-content: center;
  }

  .stage {
    width: 100%;
    max-width: var(--max-w);
    padding: 44px var(--pad) 64px;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  /* ───── HEADER / WORDMARK ───── */
  .wordmark {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 4px;
    user-select: none;
  }
  .wordmark a {
    display: block;
    width: 100%;
    text-align: center;
    transition: opacity 0.35s ease;
  }
  .wordmark a:hover { opacity: 0.78; }
  .wordmark img {
    display: inline-block;
    width: 72%;
    max-width: 280px;
    height: auto;
    -webkit-user-drag: none;
  }

  /* ───── BRAND LINKS (under wordmark) ───── */
  .brand-links {
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .brand-links a {
    width: 42px;
    height: 42px;
    border: 1px solid var(--hair);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--ink);
    text-decoration: none;
    transition: background 0.35s ease, border-color 0.35s ease, transform 0.35s cubic-bezier(.2,.7,.2,1.4);
  }
  .brand-links a:hover {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
    transform: translateY(-2px);
  }
  .brand-links a svg { width: 18px; height: 18px; display: block; }

  /* ───── HERO PHOTO ───── */
  .hero {
    position: relative;
    width: 100%;
    aspect-ratio: 1336 / 2000;
    overflow: hidden;
    background: #111;
    border-radius: 14px;
  }
  .hero img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: contrast(1.02) brightness(0.98);
  }

  /* ───── DOT MARKERS ───── */
  .dot-marker {
    position: absolute;
    width: 22px;
    height: 22px;
    border: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
    transform: translate(-50%, -50%);
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  /* hover name label under each dot */
  .dot-label {
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translate(-50%, -6px);
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    background: rgba(10, 10, 10, 0.72);
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
    padding: 5px 9px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease, transform 0.45s cubic-bezier(.2,.7,.2,1);
  }
  .dot-marker:hover .dot-label,
  .dot-marker:focus-visible .dot-label {
    opacity: 1;
    transform: translate(-50%, 0);
  }
  .dot-marker::before,
  .dot-marker::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  /* solid white core */
  .dot-marker::before {
    background: var(--dot);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.15),
      0 2px 10px rgba(0,0,0,0.35);
    transition: transform 0.4s cubic-bezier(.2,.7,.2,1.2);
  }
  /* expanding pulse ring */
  .dot-marker::after {
    background: var(--dot);
    opacity: 0.55;
    animation: pulse 2.4s ease-out infinite;
  }
  .dot-marker:nth-of-type(2)::after { animation-delay: 0.6s; }
  .dot-marker:nth-of-type(3)::after { animation-delay: 1.2s; }

  .dot-marker:hover::before { transform: scale(1.15); }
  .dot-marker[aria-expanded="true"]::before {
    transform: scale(1.35);
    background: var(--ink);
  }
  .dot-marker[aria-expanded="true"]::after {
    animation: none;
    opacity: 0;
  }

  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.55; }
    70%  { transform: scale(3.2); opacity: 0;    }
    100% { transform: scale(3.2); opacity: 0;    }
  }

  /* Approximate dot positions over team-small.jpg (1336x2000) */
  .dot-marker.d1 { left: 21.5%; top: 35.5%; }   /* Alexander */
  .dot-marker.d2 { left: 47.5%; top: 41%;  }   /* Ina */
  .dot-marker.d3 { left: 71%;   top: 47%;  }   /* Ruben */

  /* ───── FOUNDER LIST / ACCORDION ───── */
  .founders {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--hair);
  }
  .founder {
    border-bottom: 1px solid var(--hair);
  }
  .founder__head {
    width: 100%;
    background: transparent;
    border: 0;
    padding: 22px 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    font-size: 12.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
  }
  .founder__head .name {
    flex: 1;
    min-width: 0;
    transition: transform 0.5s cubic-bezier(.2,.7,.2,1);
  }
  .founder__head .toggle {
    position: relative;
    width: 14px;
    height: 14px;
    flex: none;
  }
  .founder__head .toggle::before,
  .founder__head .toggle::after {
    content: "";
    position: absolute;
    background: var(--ink);
    transition: transform 0.5s cubic-bezier(.2,.7,.2,1), opacity 0.4s ease;
  }
  .founder__head .toggle::before { /* horizontal */
    left: 0; right: 0; top: 50%;
    height: 1px; transform: translateY(-50%);
  }
  .founder__head .toggle::after  { /* vertical */
    top: 0; bottom: 0; left: 50%;
    width: 1px; transform: translateX(-50%);
  }
  .founder[aria-expanded="true"] .toggle::after  { transform: translateX(-50%) rotate(90deg); opacity: 0; }
  .founder[aria-expanded="true"] .toggle::before { transform: translateY(-50%) rotate(180deg); }
  .founder[aria-expanded="true"] .name        { transform: translateX(6px); }

  /* collapsible panel */
  .founder__body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.6s cubic-bezier(.2,.7,.2,1);
  }
  .founder__body > .inner {
    overflow: hidden;
    min-height: 0;
  }
  .founder[aria-expanded="true"] .founder__body { grid-template-rows: 1fr; }

  .founder__body .inner-pad {
    padding: 0 2px 26px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.45s ease 0.12s, transform 0.5s cubic-bezier(.2,.7,.2,1) 0.1s;
  }
  .founder[aria-expanded="true"] .founder__body .inner-pad {
    opacity: 1;
    transform: translateY(0);
  }

  .founder__role {
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 2px;
  }

  .contact {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--ink);
    text-decoration: none;
    font-size: 12.5px;
    letter-spacing: 0.06em;
    padding: 4px 0;
    position: relative;
    width: fit-content;
    max-width: 100%;
  }
  .contact .label {
    width: 56px;
    font-size: 9.5px;
    letter-spacing: 0.22em;
    color: var(--ink-dim);
    text-transform: uppercase;
    flex: none;
  }
  .contact .val {
    position: relative;
  }
  .contact .val::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -3px;
    height: 1px;
    background: var(--ink);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.5s cubic-bezier(.2,.7,.2,1);
  }
  .contact:hover .val::after,
  .contact:focus-visible .val::after { transform: scaleX(1); }

  .socials {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .socials a {
    width: 40px;
    height: 40px;
    border: 1px solid var(--hair);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--ink);
    text-decoration: none;
    transition: background 0.35s ease, border-color 0.35s ease, transform 0.35s cubic-bezier(.2,.7,.2,1.4);
  }
  .socials a:hover {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
    transform: translateY(-2px);
  }
  .socials a svg { width: 18px; height: 18px; display: block; }

  /* ───── OTHER BRAND FOOTER ───── */
  .other {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    padding: 60px 0 12px;
  }
  .other .eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .alter-logo {
    display: block;
    width: 100%;
    text-align: center;
    text-decoration: none;
    color: var(--ink);
    transition: opacity 0.35s ease;
  }
  .alter-logo:hover { opacity: 0.78; }
  .alter-logo img {
    display: inline-block;
    width: 180px;
    max-width: 60%;
    height: auto;
    -webkit-user-drag: none;
  }

  /* fade-in on load */
  .stage > * { opacity: 0; animation: rise 0.9s cubic-bezier(.2,.7,.2,1) forwards; }
  .stage > *:nth-child(1) { animation-delay: 0.05s; }
  .stage > *:nth-child(2) { animation-delay: 0.15s; }
  .stage > *:nth-child(3) { animation-delay: 0.30s; }
  .stage > *:nth-child(4) { animation-delay: 0.45s; }
  .stage > *:nth-child(5) { animation-delay: 0.60s; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

<script>
  (function () {
    const founders = document.querySelectorAll('.founder');
    const dots = document.querySelectorAll('.dot-marker');

    function setOpen(id, open) {
      founders.forEach(f => {
        const isTarget = f.id === id;
        const willOpen = isTarget && open;
        f.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
        const head = f.querySelector('.founder__head');
        if (head) head.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
      });
      dots.forEach(d => {
        d.setAttribute('aria-expanded', d.dataset.target === id && open ? 'true' : 'false');
      });
    }

    function toggle(id) {
      const target = document.getElementById(id);
      if (!target) return;
      const isOpen = target.getAttribute('aria-expanded') === 'true';
      setOpen(id, !isOpen);
      if (!isOpen) {
        // smooth-scroll the opening row into view (mobile niceness)
        setTimeout(() => {
          const top = target.getBoundingClientRect().top + window.scrollY - 24;
          window.scrollTo({ top, behavior: 'smooth' });
        }, 80);
      }
    }

    document.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.addEventListener('click', () => toggle(btn.dataset.toggle));
    });
    dots.forEach(d => {
      d.addEventListener('click', () => toggle(d.dataset.target));
    });
  })();
</script>
